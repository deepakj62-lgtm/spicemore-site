# Cloudflare Pages config for spicemore-site.
# Run `wrangler pages deploy .` (after `wrangler login`) to deploy.

name = "spicemore-site"
compatibility_date = "2026-04-28"

# Static HTML lives at the repo root; Pages Functions live in ./functions.
pages_build_output_dir = "."

# nodejs_compat lets us use `Buffer`, Node `crypto`, etc. inside Pages Functions
# (pdf-lib, resend, and a couple of helpers expect Node-style globals).
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding. Replaces @vercel/blob — every key the old blob store used
# (attendance/, requests/, payouts/, sepl-*/, suggestions/, whatsapp-outbox/, …)
# now lives under this single bucket.
[[r2_buckets]]
binding = "BLOB_BUCKET"
bucket_name = "spicemore-attendance-apac"

# Convenience alias used by the attend-* handlers per the migration brief.
# Points at the same physical bucket — no separate data store needed.
[[r2_buckets]]
binding = "ATTENDANCE_BUCKET"
bucket_name = "spicemore-attendance-apac"


