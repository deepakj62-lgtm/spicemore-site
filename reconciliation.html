  <script>
    if (sessionStorage.getItem('smtc_auth') === 'true') {
      document.getElementById('toolFrame').src = 'tools/bank-reconciliation-tool.html';
      document.getElementById('toolFrame').style.display = 'block';

      document.getElementById('authRedirect').style.display = 'flex';
