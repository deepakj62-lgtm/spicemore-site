<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | SEPL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sepl-wrap { max-width:440px; margin:0 auto; padding:90px 20px 40px; }
    .sepl-card { background:var(--white); border:1px solid var(--light-gray); border-radius:12px; padding:28px; }
    .sepl-h1 { font-family:var(--font-heading); font-weight:700; font-size:24px; color:var(--green-dark); margin-bottom:4px; }
    .sepl-sub { color:var(--tan); margin-bottom:20px; font-size:14px; }
    label { display:block; font-size:13px; margin-bottom:6px; color:var(--dark-text); }
    input { width:100%; padding:12px; border:1px solid var(--light-gray); border-radius:8px; font-family:var(--font-body); font-size:15px; margin-bottom:14px; }
    button { width:100%; padding:14px; background:var(--green-primary); color:var(--white); border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; font-family:var(--font-body); }
    button[disabled] { opacity:.5; cursor:not-allowed; }
    .err { color:#b33; font-size:13px; margin:6px 0; }
    .ok { color:var(--green-dark); font-size:13px; margin:6px 0; }
    .hint { color:var(--tan); font-size:12px; margin-top:-8px; margin-bottom:14px; }
  </style>
</head>
<body>
  <nav class="navbar"><div class="nav-container">
    <a href="../../index.html" class="nav-logo"><img src="../../images/logo.png" alt="Spice More"></a>
  </div></nav>
  <div class="sepl-wrap">
    <div class="sepl-card">
      <div class="sepl-h1">Staff login</div>
      <div class="sepl-sub">Mobile number + password</div>
      <label>Mobile number</label>
      <input id="mobile" type="tel" inputmode="numeric" autocomplete="username" placeholder="10-digit mobile">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Password">
      <div class="hint">First time? Your initial password is your 10-digit mobile number. You can change it after login.</div>
      <button id="signin">Sign in</button>
      <div id="msg"></div>
    </div>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    async function signIn() {
      const username = $('mobile').value.trim();
      const password = $('password').value;
      if (!username || !password) { $('msg').innerHTML = '<div class="err">Mobile and password required.</div>'; return; }
      $('signin').disabled = true; $('msg').innerHTML = '';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok || !d.ok) throw new Error(d.error || 'Login failed');
        const STAFF_ROLES = ['staff','admin','manager','ot_manager'];
        if (!STAFF_ROLES.includes(d.user.role)) throw new Error('This account is not a staff account.');
        // Bridge unified cookie session into legacy sessionStorage so existing
        // SEPL pages (intake/portfolio/etc.) keep working unchanged. The actual
        // auth check happens server-side via the sm_session cookie.
        sessionStorage.sepl_token = '_cookie_';
        sessionStorage.sepl_role  = d.user.role === 'staff' || d.user.role === 'ot_manager' ? d.user.role : 'staff';
        sessionStorage.sepl_name  = d.user.name || '';
        sessionStorage.sepl_phone = d.user.mobile || '';
        location.href = 'intake.html';
      } catch (e) {
        $('msg').innerHTML = '<div class="err">' + (e.message || 'Login failed') + '</div>';
        $('signin').disabled = false;
      }
    }
    $('signin').onclick = signIn;
    $('password').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
    $('mobile').addEventListener('keydown', e => { if (e.key === 'Enter') $('password').focus(); });
  </script>
</body>
</html>
