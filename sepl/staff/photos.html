<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Photos | SEPL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .wrap { max-width:1200px; margin:0 auto; padding:90px 16px 40px; }
    .card { background:var(--white); border:1px solid var(--light-gray); border-radius:12px; padding:20px; margin-bottom:16px; }
    .h1 { font-family:var(--font-heading); font-weight:700; font-size:22px; color:var(--green-dark); margin-bottom:4px; }
    .sub { color:var(--tan); font-size:13px; margin-bottom:14px; }
    .nav-sub { display:flex; gap:10px; margin-bottom:14px; font-size:13px; flex-wrap:wrap; }
    .nav-sub a { color:var(--green-dark); text-decoration:underline; }
    .nav-sub a.active { font-weight:600; text-decoration:none; }
    .filter-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; font-size:13px; }
    .filter-row input, .filter-row select { padding:7px 10px; border:1px solid var(--light-gray); border-radius:6px; font:inherit; background:#fff; }
    .filter-row input { width:200px; }
    .count { color:var(--tan); font-size:12px; }
    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px; }
    .photo-card { border:1px solid var(--light-gray); border-radius:10px; overflow:hidden; background:#fff; cursor:pointer; transition:box-shadow .15s, border-color .15s; }
    .photo-card:hover { border-color:var(--green-dark); box-shadow:0 3px 10px rgba(31,77,43,0.13); }
    .photo-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:var(--cream); }
    .photo-meta { padding:10px 12px; }
    .photo-meta .name { font-weight:600; font-size:13px; color:var(--green-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .photo-meta .detail { font-size:11px; color:var(--tan); margin-top:3px; line-height:1.5; }
    .empty { color:var(--tan); font-size:14px; padding:20px 0; }
    .err { color:#b33; font-size:13px; }

    /* Lightbox */
    .lb { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
    .lb.open { display:flex; }
    .lb img { max-width:100%; max-height:80vh; object-fit:contain; border-radius:6px; box-shadow:0 4px 30px rgba(0,0,0,0.5); }
    .lb-caption { color:rgba(255,255,255,0.85); font-size:13px; margin-top:12px; text-align:center; line-height:1.5; }
    .lb-close { position:fixed; top:14px; right:18px; background:none; border:none; color:#fff; font-size:30px; cursor:pointer; line-height:1; opacity:.75; }
    .lb-close:hover { opacity:1; }
  </style>
</head>
<body>
  <nav class="navbar"><div class="nav-container">
    <a href="../../index.html" class="nav-logo"><img src="../../images/logo.png" alt="Spice More"></a>
  </div></nav>

  <div class="wrap">
    <div class="nav-sub">
      <a href="intake.html">Intake</a> ·
      <a href="portfolio.html">Portfolio</a> ·
      <a href="photos.html" class="active">Photos</a>
      <span style="flex:1"></span>
      <button id="logout" style="font-size:13px; color:var(--green-dark); text-decoration:underline; cursor:pointer; background:none; border:0; padding:0; font-family:inherit;">Logout</button>
    </div>

    <div class="card">
      <div class="h1">Stock sample archive</div>
      <div class="sub">Sample photos captured at intake, organised by date.</div>

      <div class="filter-row">
        <select id="depotFilter">
          <option value="">All depots</option>
          <option value="KUMILY">Kumily</option>
          <option value="KOLLAPARACHAL">Kollaparachal</option>
        </select>
        <input id="search" type="search" placeholder="Search client or ID…">
        <span class="count" id="countLabel"></span>
      </div>

      <div id="grid" class="photo-grid"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
  </div>

<script>
(function(){
  const token = sessionStorage.sepl_token;
  if (!token || sessionStorage.sepl_role !== 'staff') { location.href = 'login.html'; return; }
  const hdr = { 'Authorization': 'Bearer ' + token };

  document.getElementById('logout').onclick = () => {
    ['sepl_token','sepl_role','sepl_name','sepl_phone'].forEach(k => sessionStorage.removeItem(k));
    location.href = 'login.html';
  };

  let all = [];

  async function load() {
    try {
      const r = await fetch('/api/sepl/transactions', { headers: hdr });
      if (r.status === 401) { location.href = 'login.html'; return; }
      const d = await r.json();
      all = (d.transactions || [])
        .filter(t => t.samplePhotoUrl)
        .sort((a, b) => (b.intakeDate || '').localeCompare(a.intakeDate || ''));
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="err">Could not load. Please refresh.</div>';
    }
  }

  function render() {
    const depot = document.getElementById('depotFilter').value;
    const q = document.getElementById('search').value.trim().toLowerCase();
    const filtered = all.filter(t => {
      if (depot && (t.depot || '').toUpperCase() !== depot) return false;
      if (q && !(t.txnId || '').toLowerCase().includes(q) && !(t.consignorName || '').toLowerCase().includes(q) && !(t.consignorId || '').toLowerCase().includes(q)) return false;
      return true;
    });

    document.getElementById('countLabel').textContent = filtered.length + ' photo' + (filtered.length !== 1 ? 's' : '');

    if (!filtered.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No photos found.</div>';
      return;
    }

    document.getElementById('grid').innerHTML = filtered.map((t, i) =>
      '<div class="photo-card" data-i="' + i + '">' +
        '<img src="' + t.samplePhotoUrl + '" alt="Sample" loading="lazy">' +
        '<div class="photo-meta">' +
          '<div class="name">' + (t.consignorName || t.consignorId || t.txnId) + '</div>' +
          '<div class="detail">' +
            (t.txnId || '') + '<br>' +
            (t.depot || '') + ' · ' + (t.intakeDate || '') + '<br>' +
            (t.netWeightKg ? Number(t.netWeightKg).toLocaleString('en-IN') + ' kg' : '') +
          '</div>' +
        '</div>' +
      '</div>'
    ).join('');

    document.getElementById('grid').querySelectorAll('.photo-card').forEach(card => {
      card.addEventListener('click', () => {
        const t = filtered[Number(card.dataset.i)];
        document.getElementById('lbImg').src = t.samplePhotoUrl;
        document.getElementById('lbCaption').innerHTML =
          '<b>' + (t.consignorName || t.consignorId || '') + '</b> &nbsp;·&nbsp; ' +
          (t.txnId || '') + '<br>' +
          (t.depot || '') + ' &nbsp;·&nbsp; ' + (t.intakeDate || '') +
          (t.netWeightKg ? ' &nbsp;·&nbsp; ' + Number(t.netWeightKg).toLocaleString('en-IN') + ' kg' : '');
        document.getElementById('lb').classList.add('open');
      });
    });
  }

  document.getElementById('lbClose').onclick = () => document.getElementById('lb').classList.remove('open');
  document.getElementById('lb').addEventListener('click', e => {
    if (e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open');
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('lb').classList.remove('open'); });

  document.getElementById('depotFilter').addEventListener('change', render);
  document.getElementById('search').addEventListener('input', render);

  load();
})();
</script>
</body>
</html>
