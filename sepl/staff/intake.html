<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intake | SEPL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sepl-wrap { max-width:680px; margin:0 auto; padding:90px 16px 40px; }
    .sepl-card { background:var(--white); border:1px solid var(--light-gray); border-radius:12px; padding:20px; margin-bottom:14px; }
    .sepl-h { font-family:var(--font-heading); font-weight:700; color:var(--green-dark); margin-bottom:10px; }
    .h1 { font-size:22px; } .h2 { font-size:16px; margin-top:8px; }
    label { display:block; font-size:13px; margin-bottom:6px; color:var(--brown); }
    input, select, textarea { width:100%; padding:11px; border:1px solid var(--light-gray); border-radius:8px; font-size:15px; margin-bottom:12px; font-family:var(--font-body); background:var(--white); }
    button { padding:12px 18px; background:var(--green-primary); color:var(--white); border:none; border-radius:8px; font-size:14px; cursor:pointer; font-family:var(--font-body); }
    button.small { padding:8px 12px; font-size:13px; }
    button.secondary { background:var(--button-dark); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .calc { background:var(--cream); padding:16px; border-radius:8px; }
    .calc-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--light-gray); font-size:14px; }
    .calc-row b { font-family:var(--font-heading); color:var(--green-dark); }
    .nav-sub { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; font-size:13px; }
    .nav-sub a { color:var(--green-dark); text-decoration:underline; }
    .ok { color:var(--green-dark); font-weight:500; } .err { color:#b33; }
    .hidden { display:none; }
    @media (max-width:500px) { .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar"><div class="nav-container">
    <a href="../../index.html" class="nav-logo"><img src="../../images/logo.png" alt="Spice More"></a>
  </div></nav>
  <div class="sepl-wrap">
    <div class="nav-sub">
      <a href="intake.html">Intake</a> ·
      <a href="consignors.html">Clients</a> ·
      <a href="transactions.html">Transactions</a> ·
      <a href="daily-price.html">Daily price</a> ·
      <a href="portfolio.html">Portfolio</a> ·
      <a href="settings.html">Settings</a> ·
      <a href="#" id="logout">Logout</a>
    </div>
    <div class="sepl-card">
      <div class="sepl-h h1">New intake</div>
      <div id="who" style="font-size:13px; color:var(--tan); margin-bottom:10px;"></div>

      <div class="sepl-h h2">1. Intake details</div>
      <div class="row">
        <div><label>Net weight (kg)</label><input id="netWeightKg" type="number" step="0.01"></div>
        <div><label>Benchmark price (₹/kg)</label><input id="benchmarkPricePerKg" type="number" step="0.01"></div>
        <div><label>Depot</label><select id="depot"><option>Kumily</option><option>Kollaparachal</option></select></div>
        <div><label>Sample %</label><input id="samplePct" type="number" step="0.01" value="0"></div>
      </div>
      <label>Grade notes</label>
      <textarea id="gradeNotes" rows="2"></textarea>

      <div class="sepl-h h2">Live calc</div>
      <div class="calc">
        <div class="calc-row"><span>Gross stock value</span><b id="c_gross">₹0</b></div>
        <div class="calc-row"><span>Advance offer (65%)</span><b id="c_adv">₹0</b></div>
        <div class="calc-row"><span>Daily holding charge (21% p.a.)</span><b id="c_daily">₹0</b></div>
        <div class="calc-row"><span>Expected exit (90d)</span><b id="c_exit">—</b></div>
        <div class="calc-row"><span>Max exit (120d)</span><b id="c_max">—</b></div>
      </div>

      <div class="sepl-h h2">2. Client</div>
      <div class="row">
        <div>
          <label>Select client</label>
          <select id="consignorId"><option value="">— choose —</option></select>
        </div>
        <div style="display:flex; align-items:flex-end;">
          <button class="small secondary" id="toggleNew" type="button">+ New client</button>
        </div>
      </div>

      <div id="newForm" class="hidden" style="background:var(--cream); padding:14px; border-radius:8px; margin-bottom:12px;">
        <div class="row">
          <div><label>Name</label><input id="n_name"></div>
          <div><label>Type</label><select id="n_type"><option>Planter</option><option>Dealer</option><option>Trader</option></select></div>
          <div><label>PAN</label><input id="n_pan"></div>
          <div><label>Spices Board Reg</label><input id="n_sb"></div>
          <div><label>Bank A/C</label><input id="n_bank"></div>
          <div><label>IFSC</label><input id="n_ifsc"></div>
          <div><label>Phone</label><input id="n_phone" type="tel"></div>
          <div><label>Depot</label><select id="n_depot"><option>Kumily</option><option>Kollaparachal</option></select></div>
          <div><label>Max Exposure (₹)</label><input id="n_max" type="number"></div>
          <div><label>Rate (decimal, default 0.21)</label><input id="n_rate" type="number" step="0.01" value="0.21"></div>
        </div>
        <button id="saveNew" type="button">Save client</button>
        <span id="newMsg" style="margin-left:10px; font-size:13px;"></span>
      </div>

      <div style="margin-top:14px;">
        <button id="submit">Create intake</button>
        <span id="subMsg" style="margin-left:10px; font-size:13px;"></span>
      </div>
    </div>

    <div id="confirm" class="sepl-card hidden">
      <div class="sepl-h h2">Intake created</div>
      <div id="confirmBody"></div>
      <button id="sendAgreement" style="margin-top:10px;">Send agreement to client WhatsApp</button>
      <span id="agreeMsg" style="margin-left:10px; font-size:13px;"></span>
    </div>
  </div>

<script>
  const token = sessionStorage.sepl_token;
  if (!token || sessionStorage.sepl_role !== 'staff') { location.href = 'login.html'; }
  const $ = id => document.getElementById(id);
  $('who').textContent = 'Signed in as ' + (sessionStorage.sepl_name||'') + ' (' + (sessionStorage.sepl_phone||'') + ')';
  $('logout').onclick = (e) => { e.preventDefault(); sessionStorage.clear(); location.href='login.html'; };

  const hdr = { 'Content-Type':'application/json', 'Authorization':'Bearer '+token };

  async function loadConsignors() {
    const r = await fetch('/api/sepl/consignors', { headers: hdr });
    const d = await r.json();
    const sel = $('consignorId'); sel.innerHTML = '<option value="">— choose —</option>';
    (d.consignors||[]).forEach(c => {
      const o = document.createElement('option'); o.value = c.consignorId;
      o.textContent = c.consignorId + ' · ' + c.name + ' (' + c.type + ')';
      sel.appendChild(o);
    });
  }
  loadConsignors();

  $('toggleNew').onclick = () => $('newForm').classList.toggle('hidden');
  $('saveNew').onclick = async () => {
    const body = {
      name: $('n_name').value, type: $('n_type').value, pan: $('n_pan').value,
      spicesBoardReg: $('n_sb').value, bankAccount: $('n_bank').value, ifsc: $('n_ifsc').value,
      phone: $('n_phone').value, depot: $('n_depot').value,
      maxExposure: Number($('n_max').value)||0, rateAssigned: Number($('n_rate').value)||0.21
    };
    const r = await fetch('/api/sepl/consignors', { method:'POST', headers: hdr, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { $('newMsg').innerHTML = '<span class="err">'+d.error+'</span>'; return; }
    $('newMsg').innerHTML = '<span class="ok">Saved '+d.consignor.consignorId+'</span>';
    await loadConsignors();
    $('consignorId').value = d.consignor.consignorId;
    $('newForm').classList.add('hidden');
  };

  function calc() {
    const w = Number($('netWeightKg').value)||0;
    const p = Number($('benchmarkPricePerKg').value)||0;
    const gross = w*p;
    const adv = gross*0.65;
    const daily = adv*0.21/365;
    const inr = n => '₹'+n.toLocaleString('en-IN',{maximumFractionDigits:2});
    $('c_gross').textContent = inr(gross);
    $('c_adv').textContent = inr(adv);
    $('c_daily').textContent = inr(daily);
    const d = new Date(); const e = new Date(); e.setDate(d.getDate()+90);
    const m = new Date(); m.setDate(d.getDate()+120);
    $('c_exit').textContent = e.toISOString().slice(0,10);
    $('c_max').textContent = m.toISOString().slice(0,10);
  }
  ['netWeightKg','benchmarkPricePerKg'].forEach(id => $(id).addEventListener('input', calc));

  let lastTxn = null;
  $('submit').onclick = async () => {
    const body = {
      consignorId: $('consignorId').value,
      netWeightKg: Number($('netWeightKg').value),
      benchmarkPricePerKg: Number($('benchmarkPricePerKg').value),
      gradeNotes: $('gradeNotes').value,
      samplePct: Number($('samplePct').value)||0,
      depot: $('depot').value
    };
    if (!body.consignorId) { $('subMsg').innerHTML='<span class="err">Pick a client</span>'; return; }
    const r = await fetch('/api/sepl/transactions', { method:'POST', headers:hdr, body:JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { $('subMsg').innerHTML='<span class="err">'+d.error+'</span>'; return; }
    lastTxn = d.transaction;
    const t = d.transaction;
    $('confirm').classList.remove('hidden');
    $('confirmBody').innerHTML =
      '<div><b>'+t.txnId+'</b> · '+t.consignorName+' · '+t.depot+'</div>'+
      '<div>Weight: '+t.netWeightKg+'kg · Advance: ₹'+t.advanceAmount.toLocaleString('en-IN')+' · Daily ₹'+t.dailyHoldingCharge.toFixed(2)+'</div>'+
      '<div>Exit: '+t.expectedExitDate+'</div>';
    $('subMsg').innerHTML = '<span class="ok">Created '+t.txnId+'</span>';
  };

  $('sendAgreement').onclick = async () => {
    if (!lastTxn) return;
    $('agreeMsg').textContent = 'Generating…';
    const r = await fetch('/api/sepl/agreement-pdf', { method:'POST', headers:hdr, body: JSON.stringify({ txnId: lastTxn.txnId }) });
    const d = await r.json();
    if (!r.ok) { $('agreeMsg').innerHTML='<span class="err">'+d.error+'</span>'; return; }
    $('agreeMsg').innerHTML = '<span class="ok">Sent ✓ (WhatsApp stubbed — payload saved to outbox)</span>';
  };
</script>
</body>
</html>
