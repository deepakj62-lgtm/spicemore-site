<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="../css/style.css">
  <style>
    .sepl-wrap { max-width:480px; margin:0 auto; padding:90px 20px 40px; }
    .sepl-card { background:var(--white); border:1px solid var(--light-gray); border-radius:12px; padding:28px; margin-bottom:16px; }

    .sepl-sub { color:var(--tan); margin-bottom:24px; }
    .sepl-btn { display:block; width:100%; padding:16px; background:var(--green-primary); color:var(--white); border:none; border-radius:8px; font-size:16px; font-weight:500; font-family:var(--font-body); cursor:pointer; margin-bottom:12px; text-align:center; text-decoration:none; }
    .sepl-btn.secondary { background:var(--button-dark); }
    .sepl-btn:hover { opacity:.92; }
    .sepl-meta { font-size:12px; color:var(--mid-gray); text-align:center; margin-top:24px; }
  </style>

  <nav class="navbar"><div class="nav-container">

      <div class="sepl-h1">SEPL Consignment</div>
